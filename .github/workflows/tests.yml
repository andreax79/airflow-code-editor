name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    name: Run tests (Python ${{matrix.python}}, Airflow ${{matrix.airflow}})

    strategy:
      matrix:
        python:
        - "3.13"
        airflow:
        - "3.2.2"

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python }}

    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-python-${{ matrix.python }}-airflow-${{ matrix.airflow }}-pip-${{ hashFiles('**/requirements*.txt') }}-git-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-python-${{ matrix.python }}-airflow-${{ matrix.airflow }}-pip-${{ hashFiles('**/requirements*.txt') }}
          ${{ runner.os }}-python-${{ matrix.python }}-airflow-${{ matrix.airflow }}-pip-
          ${{ runner.os }}-python-${{ matrix.python }}-
          ${{ runner.os }}-python
          ${{ runner.os }}-

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade setuptools wheel

    - name: Install environment
      run: |
        python -m pip install apache-airflow==${{ matrix.airflow }} pytest
        python -m pip install -r requirements.txt
        pip freeze

    - name: Run tests
      run: |
        git config --global user.email "dev@example.com"
        git config --global user.name "Test"
        pytest tests

  all_done:
    name: Tests done
    runs-on: ubuntu-latest
    needs: [tests]

    steps:
      - name: All done
        run: echo 1
